<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Automatización - Acme</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Planta Macondo - Control de Producción</h1>
    </header>

    <main>
        <section id="modulo-usuarios" style="display: none;">
            <h2>Registro de Usuarios</h2>
            <form id="form-usuario">
                <label for="identificacion">Número de Identificación:</label>
                <input type="number" id="identificacion" required>

                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" required>

                <label for="cargo">Cargo:</label>
                <select id="cargo" required>
                    <option value="" disabled selected>Selecciona un cargo</option>
                    <option value="administrador">Administrador</option>
                    <option value="Supervisor de Planta">Supervisor de Planta</option>
                    <option value="Operario de Produccion">Operario de Produccion</option>
                    <option value="Analista de Inventario">Analista de Inventario</option>
                </select>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>

                <label for="confirm-password">Confirmar Contraseña:</label>
                <input type="password" id="confirm-password" required>

                <button type="submit">Guardar Usuario</button>
            </form>
        </section>

        <section id="modulo-login">
            <h2>Iniciar Sesión</h2>
            <form id="form-login">
                <label for="login-identificacion">Número de Identificación:</label>
                <input type="number" id="login-identificacion" required>

                <label for="login-password">Contraseña:</label>
                <input type="password" id="login-password" required>

                <button type="submit" style="background-color: #2c3e50;">Ingresar</button>
            </form>
        </section>

        <div style="text-align: center; margin-top: 1.5rem;">
            <button id="btn-ir-a-login"
                style="background: none; color: #2c3e50; border: none; text-decoration: underline; cursor: pointer; display: none;">¿Ya
                tienes cuenta? Inicia Sesión</button>
            <button id="btn-ir-a-registro"
                style="background: none; color: #2c3e50; border: none; text-decoration: underline; cursor: pointer; display: inline-block;">¿No
                tienes cuenta? Regístrate</button>
        </div>
    </main>

    <script src="users_login.js"></script>
</body>

</html>
