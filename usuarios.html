<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planta Macondo - Administración de Usuarios</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Planta Macondo - Administración de Usuarios</h1>
        <nav style="margin-top: 10px;">
            <a href="inventario.html" style="color: white; margin-right: 15px;">Inventario</a>
            <a href="produccion.html" style="color: white; margin-right: 15px;">Producción</a>
            <a href="usuarios.html" style="color: white; margin-right: 15px; font-weight: bold;">Usuarios</a>
            <button id="btn-cerrar-sesion" style="background-color: #e74c3c; padding: 0.5rem; font-size: 0.9rem;">Cerrar
                Sesión</button>
        </nav>
    </header>

    <main id="contenedor-usuarios">
        <section>
            <h2>Agregar Nuevo Usuario</h2>
            <form id="form-admin-usuario">
                <label for="admin-identificacion">Número de Identificación:</label>
                <input type="number" id="admin-identificacion" required>

                <label for="admin-nombre">Nombre Completo:</label>
                <input type="text" id="admin-nombre" required>

                <label for="admin-cargo">Cargo:</label>
                <select id="admin-cargo" required>
                    <option value="" disabled selected>Selecciona un cargo</option>
                    <option value="administrador">Administrador</option>
                    <option value="Supervisor de Planta">Supervisor de Planta</option>
                    <option value="Operario de Produccion">Operario de Produccion</option>
                    <option value="Analista de Inventario">Analista de Inventario</option>
                </select>

                <label for="admin-password">Contraseña:</label>
                <input type="password" id="admin-password" required>

                <label for="admin-confirm-password">Confirmar Contraseña:</label>
                <input type="password" id="admin-confirm-password" required>

                <button type="submit">Agregar Usuario</button>
            </form>
        </section>

        <hr style="margin: 2rem 0;">

        <section>
            <h2>Usuarios Registrados</h2>
            <label for="buscador-usuarios" style="display: block; margin-bottom: 0.5rem;">Buscar usuario:</label>
            <input type="text" id="buscador-usuarios" placeholder="Buscar por nombre o ID..."
                style="width: 100%; margin-bottom: 1rem;">
            <ul id="lista-usuarios-admin" style="list-style-type: none; padding: 0;"></ul>
        </section>
    </main>

    <script src="usuarios.js"></script>
</body>

</html>
